port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
unified-delay: true
tcp-concurrent: true
external-controller: :9090
dns:
  enable: true
  ipv6: false
  prefer-h3: false
  respect-rules: false
  cache-algorithm: arc
  nameserver:
    - "https://dns.cloudflare.com/dns-query"
  default-nameserver:
    - "tls://119.29.29.29"
    - "tls://223.5.5.5"
  proxy-server-nameserver:
    - "tls://119.29.29.29"
    - "tls://223.5.5.5"
  direct-nameserver:
    - "system"
    - "tls://119.29.29.29"
    - "tls://223.5.5.5"
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "rule-set:blacklist":
      - "https://dns.cloudflare.com/dns-query"
bind-address: "*"
ipv6: true
cfw-bypass:
  - qq.com
  - music.163.com
  - '*.music.126.net'
  - localhost
  - 127.*
  - 10.*
  - 172.16.*
  - 172.17.*
  - 172.18.*
  - 172.19.*
  - 172.20.*
  - 172.21.*
  - 172.22.*
  - 172.23.*
  - 172.24.*
  - 172.25.*
  - 172.26.*
  - 172.27.*
  - 172.28.*
  - 172.29.*
  - 172.30.*
  - 172.31.*
  - 192.168.*
  - <local>
cfw-latency-timeout: 5000
